<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>Profile Page</title>

        <!-- Google Fonts -->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@300;400;500;600;700&display=swap">

        <!-- CSS -->
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>

        <!-- HEADER -->
        <div class="header">
            <a href="home.html" class="logo">C1PHER</a>

            <div class="user-menu">
                <button class="user-menu-btn" aria-label="User menu">
                    &#9776
                </button>
                <div class="user-dropdown">
                    <a href="profile.html">Profile</a>
                    <a href="journey.html">Journey</a>
                    <a href="settings.html">Settings</a>
                    <a href="home.html" onclick="localStorage.removeItem('user')">Logout</a>
                </div>
            </div>
        </div>

        <div class="profile-container">

            <h1 id="profile-username">Profile</h1>

            <p class="profile-subtitle">
                Overview of your cryptography journey.
            </p>

            <div class="profile-grid">

                <div class="profile-card">
                    <h2>Progress</h2>
                    <p id="profile-progress">0%</p>
                </div>

                <div class="profile-card">
                    <h2>Total Score</h2>
                    <p id="profile-score">0</p>
                </div>

                <div class="profile-actions">
                    <a href="journey.html" class="primary-btn">Continue Learning</a>
                </div>
                
            </div>

        </div>

            <!-- JavaScript -->
            <script src="main.js"></script>

    </body>
</html>
